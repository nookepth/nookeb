# Railway service: nookeb Worker (BullMQ consumer — OCR, thumbnails, scan-to-PDF, purge)
# NOT read automatically. In the Railway UI for the Worker service, set
#   Settings → Config-as-code → Config file path = railway.worker.toml
# The worker has no HTTP server, so there is intentionally NO healthcheckPath.
[build]
builder = "nixpacks"
buildCommand = "npm run build --workspace @nookeb/shared --workspace @nookeb/api"
# Redeploy the worker on the same API/shared paths (the summary flex card is built
# and sent here). Pinned in config-as-code so worker code changes reliably rebuild.
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "package.json",
  "package-lock.json",
  "railway.worker.toml",
]

[deploy]
startCommand = "npm run start:worker --workspace @nookeb/api"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
