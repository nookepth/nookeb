# Railway service: nookeb Worker (BullMQ consumer — OCR, thumbnails, scan-to-PDF, purge)
# NOT read automatically. In the Railway UI for the Worker service, set
#   Settings → Config-as-code → Config file path = railway.worker.toml
# The worker now runs a minimal /health HTTP endpoint (workers/index.ts) so a
# crash/hang is caught and restarted instead of silently stopping all jobs.
# It listens on WORKER_HEALTH_PORT (default 3002) — set that env var on the
# worker service to match its exposed PORT (or reference ${{PORT}}) so this
# healthcheck can reach it.
[build]
builder = "nixpacks"
buildCommand = "npm run build --workspace @nookeb/shared --workspace @nookeb/api"
# Redeploy the worker on the same API/shared paths (the summary flex card is built
# and sent here). Pinned in config-as-code so worker code changes reliably rebuild.
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "package.json",
  "package-lock.json",
  "railway.worker.toml",
]

[deploy]
startCommand = "npm run start:worker --workspace @nookeb/api"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
